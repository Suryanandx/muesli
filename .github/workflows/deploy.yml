name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "static/landing.html"
      - "static/styles.css"
      - "static/logo*.svg"
      - "vercel.json"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Configure Hostinger DNS (A record → Vercel)
        if: github.ref == 'refs/heads/main'
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
        run: |
          # Add A record: muesli.valthrax.com → 76.76.21.21 (Vercel)
          curl -sf -X POST "https://api.hostinger.com/v1/dns/zone/valthrax.com/records" \
            -H "Authorization: Bearer $HOSTINGER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type":"A","name":"muesli","value":"76.76.21.21","ttl":3600}' || \
          echo "DNS record may already exist — skipping"

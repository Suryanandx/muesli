name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "static/landing.html"
      - "static/styles.css"
      - "static/logo*.svg"
      - "vercel.json"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Ensure muesli.valthrax.com DNS A record exists
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
        run: |
          # Fetch current zone, append muesli if missing, PUT back
          ZONE=$(curl -sf "https://developers.hostinger.com/api/dns/v1/zones/valthrax.com" \
            -H "Authorization: Bearer $HOSTINGER_API_KEY")

          if echo "$ZONE" | grep -q '"name":"muesli"'; then
            echo "muesli DNS record already exists"
          else
            UPDATED=$(echo "$ZONE" | python3 -c "
          import json, sys
          zone = json.load(sys.stdin)
          zone.append({'type':'A','name':'muesli','ttl':300,'records':[{'content':'76.76.21.21','is_disabled':False}]})
          print(json.dumps({'zone': zone, 'overwrite': True}))
          ")
            curl -sf -X PUT "https://developers.hostinger.com/api/dns/v1/zones/valthrax.com" \
              -H "Authorization: Bearer $HOSTINGER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$UPDATED"
            echo "muesli DNS record created"
          fi
